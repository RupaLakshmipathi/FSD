<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seller Category – SakhiSell</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="seller-category">
    <div class="app">
      <main class="phone">
        <header class="topbar">
          <div class="left">
            <button class="icon-btn" type="button" data-back aria-label="Back">←</button>
          </div>
          <h1>Choose Category</h1>
        </header>

        <section class="section">
          <div class="label">What do you want to list?</div>
          <div class="choice-grid">
            <a class="choice" href="add-product.html" style="text-decoration:none"><div class="ico"></div><div class="name">Product</div></a>
            <a class="choice" href="add-service.html" style="text-decoration:none"><div class="ico topic-ico services"><span class="topic-marker" aria-hidden="true">🛠</span></div><div class="name">Service</div></a>
            <a class="choice" href="add-learning.html" style="text-decoration:none"><div class="ico"></div><div class="name">Learning</div></a>
            <a class="choice" href="manage-listings.html" style="text-decoration:none"><div class="ico"></div><div class="name">Manage</div></a>
          </div>

          <div class="mt-18">
            <button class="btn btn-primary" type="button" data-go="seller-verification.html">Next →</button>
          </div>
        </section>
      </main>
    </div>

    <script src="../js/app.js"></script>
  </body>
</html>
