<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Learning – SakhiSell</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="add-learning">
    <div class="app">
      <main class="phone">
        <header class="topbar">
          <div class="left">
            <button class="icon-btn" type="button" data-back aria-label="Back">←</button>
          </div>
          <h1>Add Learning</h1>
        </header>

        <section class="section">
          <div class="card section" style="border-radius:22px">
            <div class="label">Course / Session Title</div>
            <div class="field" style="border-radius:18px">
              <input placeholder="e.g. Intro to UI Design" aria-label="Learning title" />
            </div>

            <div class="label mt-14">Price</div>
            <div class="field" style="border-radius:18px">
              <input placeholder="e.g. ₹1999" aria-label="Learning price" />
            </div>

            <div class="label mt-14">Description</div>
            <div class="card" style="padding:12px 14px;border-radius:18px;background:#fff">
              <textarea rows="4" style="width:100%;border:0;outline:none;resize:none;font:inherit;color:var(--text);background:transparent" placeholder="Describe the learning offering..." aria-label="Learning description"></textarea>
            </div>
          </div>

          <div class="mt-18">
            <button class="btn btn-primary" type="button" data-go="seller-dashboard.html">Publish</button>
          </div>
        </section>
      </main>
    </div>

    <script src="../js/app.js"></script>
  </body>
</html>
