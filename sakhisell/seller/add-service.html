<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Service – SakhiSell</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="add-service">
    <div class="app">
      <main class="phone">
        <header class="topbar">
          <div class="left">
            <button class="icon-btn" type="button" data-back aria-label="Back">←</button>
          </div>
          <h1>Add Service</h1>
        </header>

        <section class="section">
          <div class="card topic-thumb services" style="border-radius:22px;padding:16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px">
            <div>
              <div style="font-weight:900">Service Showcase</div>
              <div class="small muted" style="margin-top:4px">Add a clear cover image for your service listing.</div>
            </div>
            <span class="topic-marker" aria-hidden="true">🛠</span>
          </div>

          <div class="card section" style="border-radius:22px">
            <div class="label">Service Title</div>
            <div class="field" style="border-radius:18px">
              <input placeholder="e.g. Private Yoga Session" aria-label="Service title" />
            </div>

            <div class="label mt-14">Price</div>
            <div class="field" style="border-radius:18px">
              <input placeholder="e.g. ₹499 / session" aria-label="Service price" />
            </div>

            <div class="label mt-14">Description</div>
            <div class="card" style="padding:12px 14px;border-radius:18px;background:#fff">
              <textarea rows="4" style="width:100%;border:0;outline:none;resize:none;font:inherit;color:var(--text);background:transparent" placeholder="Describe your service..." aria-label="Service description"></textarea>
            </div>
          </div>

          <div class="mt-18">
            <button class="btn btn-primary" type="button" data-go="seller-dashboard.html">Publish</button>
          </div>
        </section>
      </main>
    </div>

    <script src="../js/app.js"></script>
  </body>
</html>
