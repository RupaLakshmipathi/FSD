<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reviews – SakhiSell</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="reviews">
    <div class="app">
      <main class="phone">
        <header class="topbar">
          <div class="left">
            <button class="icon-btn" type="button" data-back aria-label="Back">←</button>
          </div>
          <h1>Reviews</h1>
        </header>

        <section class="section">
          <div class="list">
            <div class="row">
              <div class="avatar"></div>
              <div class="meta">
                <div class="t">Meera K. <span class="muted2" style="font-weight:900;font-size:11px"> · VERIFIED BUYER</span></div>
                <div class="d">“Ananya was so helpful! The saree was in perfect condition as described. Highly recommend this trusted seller.”</div>
                <div class="muted2 small" style="margin-top:6px">2 days ago</div>
              </div>
              <div class="muted2 small" style="font-weight:900">★★★★★</div>
            </div>
            <div class="row">
              <div class="avatar"></div>
              <div class="meta">
                <div class="t">Priya S. <span class="muted2" style="font-weight:900;font-size:11px"> · VERIFIED BUYER</span></div>
                <div class="d">“Quick response and fast shipping. Great experience shopping with her.”</div>
                <div class="muted2 small" style="margin-top:6px">1 week ago</div>
              </div>
              <div class="muted2 small" style="font-weight:900">★★★★★</div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="../js/app.js"></script>
  </body>
</html>
