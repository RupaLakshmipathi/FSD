<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout – SakhiSell</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="checkout">
    <div class="app">
      <main class="phone">
        <header class="topbar">
          <div class="left">
            <button class="icon-btn" type="button" data-back aria-label="Back">←</button>
          </div>
          <h1>Checkout</h1>
        </header>

        <section class="section">
          <div class="card section" style="border-radius:22px">
            <div class="label">Delivery Address</div>
            <div class="field" style="border-radius:18px">
              <input placeholder="House / Street" aria-label="Address line 1" />
            </div>
            <div class="field mt-10" style="border-radius:18px">
              <input placeholder="City" aria-label="City" />
            </div>
            <div class="field mt-10" style="border-radius:18px">
              <input placeholder="Pincode" aria-label="Pincode" inputmode="numeric" />
            </div>
          </div>

          <div class="card section mt-14" style="border-radius:22px">
            <div class="label">Payment</div>
            <div class="row">
              <div class="avatar"></div>
              <div class="meta">
                <div class="t">UPI / Card</div>
                <div class="d">UI only</div>
              </div>
              <span class="tag">Default</span>
            </div>
          </div>

          <div class="mt-18">
            <button class="btn btn-primary" type="button" data-go="buyer-orders.html">Place Order</button>
          </div>
        </section>
      </main>
    </div>

    <script src="../js/app.js"></script>
  </body>
</html>
