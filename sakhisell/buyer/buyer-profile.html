<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buyer Profile – SakhiSell</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="buyer-profile">
    <div class="app">
      <main class="phone">
        <header class="topbar">
          <div class="left">
            <button class="icon-btn" type="button" data-back aria-label="Back">←</button>
          </div>
          <h1>Profile</h1>
        </header>

        <section class="card section">
          <div class="center">
            <div class="avatar" style="width:76px;height:76px;border-radius:999px;margin:0 auto;background:rgba(255,111,143,.14)"></div>
            <h2 style="margin:10px 0 4px;font-weight:900">Sunita</h2>
            <div class="muted2 small">Buyer</div>
          </div>

          <div class="label mt-18">Account</div>
          <div class="list">
            <a class="row" href="buyer-orders.html" style="text-decoration:none">
              <div class="avatar topic-avatar orders"><span class="topic-marker" aria-hidden="true">📦</span></div>
              <div class="meta"><div class="t">My Orders</div><div class="d">Track purchases</div></div>
              <span class="tag">Open</span>
            </a>
            <a class="row" href="../index.html" style="text-decoration:none">
              <div class="avatar topic-avatar orders"><span class="topic-marker" aria-hidden="true">📦</span></div>
              <div class="meta"><div class="t">Switch to Seller</div><div class="d">Go to seller flow</div></div>
              <span class="tag">Go</span>
            </a>
          </div>
        </section>

        <nav class="bottom-nav" aria-label="Bottom navigation">
          <div class="items">
            <a class="nav-item" href="buyer-home.html"><div class="ni"></div>Home</a>
            <a class="nav-item" href="buyer-orders.html"><div class="ni"></div>Orders</a>
            <a class="nav-item" href="cart.html"><div class="ni"></div>Cart</a>
            <a class="nav-item active" href="buyer-profile.html"><div class="ni"></div>Profile</a>
          </div>
        </nav>
      </main>
    </div>

    <script src="../js/app.js"></script>
  </body>
</html>
