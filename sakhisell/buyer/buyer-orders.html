<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Orders – SakhiSell</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="buyer-orders">
    <div class="app">
      <main class="phone">
        <header class="topbar">
          <div class="left">
            <button class="icon-btn" type="button" data-back aria-label="Back">←</button>
          </div>
          <h1>My Orders</h1>
        </header>

        <section class="section">
          <div class="list">
            <div class="row">
              <div class="avatar topic-avatar orders"><span class="topic-marker" aria-hidden="true">📦</span></div>
              <div class="meta">
                <div class="t">Handmade Ceramic Pot</div>
                <div class="d">Placed: Today</div>
              </div>
              <span class="tag warn">PENDING</span>
            </div>
            <div class="row">
              <div class="avatar topic-avatar preowned"><span class="topic-marker" aria-hidden="true">♻</span></div>
              <div class="meta">
                <div class="t">Classic Leather Tote</div>
                <div class="d">Placed: 2 days ago</div>
              </div>
              <span class="tag" style="background:rgba(100,170,255,.14);border-color:rgba(100,170,255,.26);color:#2c6bd6">SHIPPED</span>
            </div>
            <div class="row">
              <div class="avatar topic-avatar services"><span class="topic-marker" aria-hidden="true">🛠</span></div>
              <div class="meta">
                <div class="t">Intro to UI Design</div>
                <div class="d">Placed: 1 week ago</div>
              </div>
              <span class="tag good">COMPLETED</span>
            </div>
          </div>

          <div class="fineprint">
            Buyer has orders only (no Aadhaar verification).
          </div>
        </section>

        <nav class="bottom-nav" aria-label="Bottom navigation">
          <div class="items">
            <a class="nav-item" href="buyer-home.html"><div class="ni"></div>Home</a>
            <a class="nav-item active" href="buyer-orders.html"><div class="ni"></div>Orders</a>
            <a class="nav-item" href="cart.html"><div class="ni"></div>Cart</a>
            <a class="nav-item" href="buyer-profile.html"><div class="ni"></div>Profile</a>
          </div>
        </nav>
      </main>
    </div>

    <script src="../js/app.js"></script>
  </body>
</html>
