<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cart – SakhiSell</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="cart">
    <div class="app">
      <main class="phone">
        <header class="topbar">
          <div class="left">
            <button class="icon-btn" type="button" data-back aria-label="Back">←</button>
          </div>
          <h1>Cart</h1>
        </header>

        <section class="section">
          <div class="list">
            <div class="row">
              <div class="avatar"></div>
              <div class="meta">
                <div class="t">Handmade Ceramic Pot</div>
                <div class="d">Qty: 1</div>
              </div>
              <div style="font-weight:900;color:var(--primary)">$24.00</div>
            </div>
            <div class="row">
              <div class="avatar"></div>
              <div class="meta">
                <div class="t">Classic Leather Tote</div>
                <div class="d">Qty: 1</div>
              </div>
              <div style="font-weight:900;color:var(--primary)">$89.00</div>
            </div>
          </div>

          <div class="card section mt-14" style="border-radius:22px">
            <div class="progress-row">
              <div class="muted small" style="font-weight:900">Total</div>
              <div style="font-weight:900">$113.00</div>
            </div>
          </div>

          <div class="mt-18">
            <button class="btn btn-primary" type="button" data-go="checkout.html">Checkout</button>
          </div>
        </section>

        <nav class="bottom-nav" aria-label="Bottom navigation">
          <div class="items">
            <a class="nav-item" href="buyer-home.html"><div class="ni"></div>Home</a>
            <a class="nav-item" href="marketplace.html"><div class="ni"></div>Shop</a>
            <a class="nav-item active" href="cart.html"><div class="ni"></div>Cart</a>
            <a class="nav-item" href="buyer-profile.html"><div class="ni"></div>Profile</a>
          </div>
        </nav>
      </main>
    </div>

    <script src="../js/app.js"></script>
  </body>
</html>
