<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Product Details – SakhiSell</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="product-details">
    <div class="app">
      <main class="phone">
        <header class="topbar">
          <div class="left">
            <button class="icon-btn" type="button" data-back aria-label="Back">←</button>
          </div>
          <h1>Details</h1>
        </header>

        <section class="section">
          <div class="card" style="border-radius:24px;overflow:hidden">
            <div style="height:220px;background:rgba(255,111,143,.14)"></div>
            <div style="padding:14px">
              <div class="progress-row">
                <div style="font-weight:900;font-size:18px">Handmade Ceramic Pot</div>
                <div class="small muted">★ 4.8</div>
              </div>
              <div class="muted small" style="margin-top:6px">Anita Designs · 0.8km</div>
              <div style="font-weight:900;color:var(--primary);font-size:18px;margin-top:10px">$24.00</div>
              <div class="muted small" style="margin-top:10px">
                Beautiful handcrafted piece. (UI only)
              </div>
            </div>
          </div>

          <div style="display:flex;gap:12px;margin-top:14px">
            <button class="btn btn-ghost" type="button" style="width:45%" data-go="cart.html">Add to Cart</button>
            <button class="btn btn-primary" type="button" style="width:55%" data-go="checkout.html">Buy Now</button>
          </div>
        </section>
      </main>
    </div>

    <script src="../js/app.js"></script>
  </body>
</html>
