<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signup – SakhiSell</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="signup">
    <div class="app">
      <main class="phone">
        <header class="topbar">
          <div class="left">
            <button class="icon-btn" type="button" data-back aria-label="Back">←</button>
          </div>
          <h1>Signup</h1>
        </header>

        <section class="card section">
          <div class="hero" style="padding-top:4px">
            <div class="logo" style="width:70px;height:70px"><div class="mark" aria-hidden="true"></div></div>
            <h2 style="font-size:28px">Create Account</h2>
          </div>

          <div class="label">Full Name</div>
          <div class="field">
            <input placeholder="Enter your full name" aria-label="Full name" />
          </div>

          <div class="label mt-14">Phone Number</div>
          <div class="field">
            <div class="prefix">+91</div>
            <input inputmode="numeric" maxlength="10" placeholder="Enter 10 digit number" aria-label="Phone number" />
          </div>

          <div class="mt-18">
            <button class="btn btn-primary" type="button" data-go="otp-verification.html">Continue</button>
          </div>

          <div class="center mt-14">
            <a href="login.html" class="small muted" style="text-decoration:none;font-weight:900">Already have an account? Login</a>
          </div>
        </section>
      </main>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
