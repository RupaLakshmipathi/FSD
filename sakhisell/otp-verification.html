<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OTP Verification – SakhiSell</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="otp">
    <div class="app">
      <main class="phone">
        <header class="topbar">
          <div class="left">
            <button class="icon-btn" type="button" data-back aria-label="Back">←</button>
          </div>
          <h1>OTP Verification</h1>
        </header>

        <section class="card section">
          <div class="hero" style="padding-top:4px">
            <div class="logo" style="width:70px;height:70px">
              <div class="mark" aria-hidden="true"></div>
            </div>
            <h2 style="font-size:28px">Verification Code</h2>
            <p>Enter the OTP sent to your mobile number</p>
          </div>

          <div class="otp-wrap" data-otp>
            <input class="otp" inputmode="numeric" maxlength="1" aria-label="OTP digit 1" />
            <input class="otp" inputmode="numeric" maxlength="1" aria-label="OTP digit 2" />
            <input class="otp" inputmode="numeric" maxlength="1" aria-label="OTP digit 3" />
            <input class="otp" inputmode="numeric" maxlength="1" aria-label="OTP digit 4" />
          </div>

          <button class="btn btn-primary" type="button" data-go="buyer/buyer-home.html">Verify &amp; Continue</button>

          <div class="center mt-14 small muted">Didn’t receive code?</div>
          <div class="center mt-10">
            <a href="#" class="small" style="color:var(--primary);font-weight:900" onclick="return false;">Resend New Code</a>
          </div>
        </section>

        <div class="fineprint">
          After OTP, you can open Seller flow from <a href="index.html" style="font-weight:900">Home</a>.
        </div>
      </main>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
