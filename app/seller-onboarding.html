<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seller Onboarding – SakhiSell</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="seller-onboarding">
    <div class="app">
      <main class="phone">
        <header class="topbar">
          <div class="left">
            <button class="icon-btn" type="button" data-back aria-label="Back">←</button>
          </div>
          <h1>Seller Onboarding</h1>
        </header>

        <div class="progress-row">
          <div>Step 1 of 4</div>
          <div style="color:var(--primary);font-weight:900">Basic Information</div>
        </div>
        <div class="progress" aria-label="Progress"><div style="width:25%"></div></div>

        <section class="section">
          <h2 style="margin:6px 0 14px;font-size:26px;font-weight:900">Enter Basic Information</h2>

          <div class="label">Full Name</div>
          <div class="field">
            <input placeholder="Enter your full name" aria-label="Full name" />
          </div>

          <div class="label mt-14">Business Name <span class="muted2">(Optional)</span></div>
          <div class="field">
            <input placeholder="Enter business name" aria-label="Business name" />
          </div>

          <div class="label mt-14">Village / City</div>
          <div class="field">
            <select aria-label="Village or city">
              <option selected disabled>Select your location</option>
              <option>Hyderabad</option>
              <option>Vijayawada</option>
              <option>Warangal</option>
            </select>
          </div>

          <div class="label mt-18">What do you want to sell?</div>
          <div class="choice-grid">
            <div class="choice" role="button" tabindex="0"><div class="ico" aria-hidden="true"></div><div class="name">Products</div></div>
            <div class="choice" role="button" tabindex="0"><div class="ico topic-ico services" aria-hidden="true"><span class="topic-marker">🛠</span></div><div class="name">Services</div></div>
            <div class="choice" role="button" tabindex="0"><div class="ico topic-ico preowned" aria-hidden="true"><span class="topic-marker">♻</span></div><div class="name">Pre-Owned</div></div>
            <div class="choice" role="button" tabindex="0"><div class="ico" aria-hidden="true"></div><div class="name">Learning</div></div>
          </div>

          <div class="mt-18">
            <button class="btn btn-primary" type="button" data-go="payment-setup.html">Continue →</button>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
